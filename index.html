<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parchi Trading Game - PAPA Edition</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for No-Node Setup -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase Scripts (Compat Versions) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .animate-bounce-subtle { animation: bounce-subtle 2.5s infinite ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body class="bg-orange-50 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Firebase Configuration ---
        // Hum environment config use karenge agar available hai (Canvas ke liye)
        // Warna aapka hardcoded config use hoga (Deployment ke liye)
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "AIzaSyDzr59rONvNpo9-VllDbdGz--MUPjAq6jo",
                authDomain: "papa-ka-game.firebaseapp.com",
                projectId: "papa-ka-game",
                storageBucket: "papa-ka-game.firebasestorage.app",
                messagingSenderId: "972552037901",
                appId: "1:972552037901:web:0e8c86fe84f8efb1169744",
                measurementId: "G-Q44XZ9GSMN"
            };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // Rule 1: Proper appId for paths
        const currentAppId = typeof __app_id !== 'undefined' ? __app_id : "parchi-game-final-v1";

        const CARDS_DATA = [
            { type: 'Apple', points: 1000, icon: '🍎' },
            { type: 'Banana', points: 500, icon: '🍌' },
            { type: 'Grapes', points: 700, icon: '🍇' },
        ];

        const ALLOWED_NAMES = ["Truffle chocolate cake", "kaka", "master abhinav"];

        function App() {
            const [user, setUser] = useState(null);
            const [userName, setUserName] = useState(localStorage.getItem('parchi_name') || '');
            const [tempName, setTempName] = useState('');
            const [gameState, setGameState] = useState(null);
            const [selectedCardIndex, setSelectedCardIndex] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState("");
            const [loginError, setLoginError] = useState("");

            const getInGameName = (name) => (name === "master abhinav" ? "PAPA" : name);
            const getRoleTitle = (name) => (name === "master abhinav" ? "Master" : "Player");

            // 1. Auth Setup (Rule 3)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        // Priority for environment token
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Auth Error:", err);
                        setError("Firebase Auth Fail: API Key ya Anonymous login check karo!");
                        setLoading(false);
                    }
                };
                
                initAuth();

                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (u) {
                        setUser(u);
                        setLoading(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            // 2. Real-time Sync (Rule 1 & 3)
            useEffect(() => {
                if (!user || !userName) return;
                
                // Segment path check: artifacts/ID/public/data/games/main (6 segments = even)
                const docPath = `artifacts/${currentAppId}/public/data/games/main`;
                
                const unsubscribe = db.doc(docPath).onSnapshot((snapshot) => {
                    if (snapshot.exists) setGameState(snapshot.data());
                    else setGameState(null);
                }, (err) => {
                    console.error("Firestore Error:", err);
                    setError("Database Error: Firestore Rules check karo!");
                });
                return () => unsubscribe();
            }, [user, userName]);

            const handleLogin = () => {
                const trimmed = tempName.trim();
                if (ALLOWED_NAMES.includes(trimmed)) {
                    setUserName(trimmed);
                    localStorage.setItem('parchi_name', trimmed);
                    setLoginError("");
                } else {
                    setLoginError("Ijazat nahi hai! Sirf VIP log allowed hain.");
                }
            };

            const createGame = async () => {
                if (!user) return;
                const deck = [];
                CARDS_DATA.forEach(item => {
                    for (let i = 0; i < 3; i++) deck.push({ ...item, id: Math.random().toString(36).substr(2, 9) });
                });
                const shuffled = deck.sort(() => Math.random() - 0.5);

                const newState = {
                    players: [{ uid: user.uid, name: getInGameName(userName) }],
                    hands: { [user.uid]: shuffled.slice(0, 3) },
                    deck: shuffled.slice(3),
                    turnIndex: 0,
                    status: 'waiting',
                    winner: null
                };
                await db.doc(`artifacts/${currentAppId}/public/data/games/main`).set(newState);
            };

            const joinGame = async () => {
                if (!user || !gameState) return;
                if (gameState.players.some(p => p.uid === user.uid)) return;
                
                const updatedPlayers = [...gameState.players, { uid: user.uid, name: getInGameName(userName) }];
                const myHand = gameState.deck.slice(0, 3);
                const restDeck = gameState.deck.slice(3);

                const updates = {
                    players: updatedPlayers,
                    [`hands.${user.uid}`]: myHand,
                    deck: restDeck,
                    status: updatedPlayers.length === 3 ? 'playing' : 'waiting'
                };
                await db.doc(`artifacts/${currentAppId}/public/data/games/main`).update(updates);
            };

            const passCard = async () => {
                if (!user || !gameState) return;
                const myIdx = gameState.players.findIndex(p => p.uid === user.uid);
                if (gameState.turnIndex !== myIdx) return;

                const nextIdx = (myIdx + 1) % 3;
                const nextUid = gameState.players[nextIdx].uid;
                const myHand = [...(gameState.hands[user.uid] || [])];
                const nextHand = [...(gameState.hands[nextUid] || [])];

                const passed = myHand.splice(selectedCardIndex, 1)[0];
                nextHand.push(passed);

                const updates = {
                    [`hands.${user.uid}`]: myHand,
                    [`hands.${nextUid}`]: nextHand,
                    turnIndex: nextIdx
                };

                const types = nextHand.map(c => c.type);
                if (new Set(types).size === 1 && nextHand.length === 3) {
                    updates.status = 'finished';
                    updates.winner = { name: gameState.players[nextIdx].name, type: types[0], points: nextHand[0].points };
                }
                await db.doc(`artifacts/${currentAppId}/public/data/games/main`).update(updates);
                setSelectedCardIndex(null);
            };

            const resetGame = async () => {
                await db.doc(`artifacts/${currentAppId}/public/data/games/main`).delete();
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-orange-50">
                    <div className="animate-spin rounded-full h-12 w-12 border-t-4 border-orange-500 mb-4"></div>
                    <p className="font-black text-orange-600 uppercase">Connecting to PAPA Server...</p>
                </div>
            );

            if (error) return (
                <div className="h-screen flex flex-col items-center justify-center bg-red-50 p-6 text-center">
                    <h2 className="text-3xl font-black text-red-600 mb-4 uppercase tracking-tighter">Connection Fail!</h2>
                    <p className="bg-white p-6 rounded-2xl shadow-md border-b-8 border-red-200 text-gray-700 font-bold mb-8">{error}</p>
                    <button onClick={() => window.location.reload()} className="bg-red-600 text-white px-12 py-4 rounded-full font-black shadow-lg uppercase tracking-widest active:scale-95">Retry Setup</button>
                </div>
            );

            if (!userName) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white p-10 rounded-[3.5rem] shadow-2xl w-full max-w-sm text-center border-b-[12px] border-orange-200">
                            <h2 className="text-3xl font-black text-gray-800 mb-2 uppercase tracking-tighter">VIP LOGIN</h2>
                            <p className="text-[10px] text-gray-400 mb-8 uppercase tracking-[0.3em] font-black">Authorized Only</p>
                            <input 
                                type="text" 
                                placeholder="Secret Name..."
                                value={tempName}
                                onChange={(e) => setTempName(e.target.value)}
                                className="w-full px-6 py-4 rounded-2xl border-2 border-orange-100 outline-none mb-4 text-center font-bold text-lg focus:border-orange-500 bg-gray-50"
                            />
                            {loginError && <p className="text-red-500 text-[10px] font-black mb-4 uppercase animate-shake">{loginError}</p>}
                            <button onClick={handleLogin} className="w-full bg-orange-500 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-sm tracking-widest uppercase">Verify Identity</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 flex flex-col items-center">
                    <header className="text-center mb-8 mt-4">
                        <h1 className="text-4xl font-black text-orange-600 uppercase tracking-tighter drop-shadow-sm">Parchi Trading</h1>
                        <div className="mt-2 inline-flex items-center gap-2 bg-white px-5 py-2 rounded-full shadow-sm border border-orange-100">
                            <span className="text-[10px] font-black uppercase text-gray-400 tracking-widest">{getRoleTitle(userName)}:</span>
                            <span className="text-sm font-black text-gray-800 uppercase">{getInGameName(userName)}</span>
                        </div>
                    </header>

                    {!gameState ? (
                        <div className="bg-white p-12 rounded-[4rem] shadow-xl text-center max-w-md w-full border-b-[10px] border-orange-200">
                            <div className="text-7xl mb-6 drop-shadow-md">🎭</div>
                            <p className="text-xl mb-10 text-gray-700 font-black italic uppercase tracking-tighter">
                                {userName === 'master abhinav' ? "Papa, khel shuru karein?" : "Waiting for PAPA..."}
                            </p>
                            <button onClick={createGame} className="w-full bg-orange-600 text-white font-black py-5 rounded-[2.5rem] shadow-xl active:scale-95 text-lg uppercase tracking-widest">Create Room</button>
                        </div>
                    ) : (
                        <div className="w-full max-w-2xl">
                            <div className="bg-white rounded-3xl p-6 mb-8 flex justify-between border-2 border-orange-50 shadow-sm">
                                <div className="flex flex-col">
                                    <span className="text-[10px] font-black text-gray-300 uppercase tracking-widest">Status</span>
                                    <span className="font-black text-orange-600 italic uppercase">{gameState.status}</span>
                                </div>
                                <div className="flex flex-col text-right">
                                    <span className="text-[10px] font-black text-gray-300 uppercase tracking-widest">Turn</span>
                                    <span className="font-black text-gray-800 italic uppercase">{gameState.players[gameState.turnIndex]?.name || "---"}</span>
                                </div>
                            </div>

                            {gameState.status === 'waiting' ? (
                                <div className="bg-white/50 border-4 border-dashed border-orange-200 p-10 rounded-[4rem] text-center mb-10">
                                    <div className="text-5xl mb-4 animate-pulse">⏳</div>
                                    <h3 className="text-xl font-black text-orange-800/60 uppercase tracking-tighter">Joining Phase... ({gameState.players.length}/3)</h3>
                                    {!gameState.players.some(p => p.uid === user.uid) && (
                                        <button onClick={joinGame} className="mt-8 px-12 py-4 bg-green-500 text-white font-black rounded-2xl shadow-lg uppercase tracking-widest active:scale-95 transition-all">Join Slot</button>
                                    )}
                                </div>
                            ) : (
                                <div className="text-center">
                                    <div className="flex justify-center gap-4 flex-wrap mb-10">
                                        {(gameState.hands[user.uid] || []).map((card, idx) => (
                                            <div 
                                                key={card.id || idx}
                                                onClick={() => setSelectedCardIndex(idx)}
                                                className={`relative w-28 h-44 bg-white rounded-3xl shadow-xl border-[4px] flex flex-col items-center justify-center transition-all duration-300 cursor-pointer ${selectedCardIndex === idx ? 'border-orange-500 -translate-y-8 scale-110 ring-[12px] ring-orange-50' : 'border-white hover:border-orange-50'}`}
                                            >
                                                <span className="text-5xl mb-2 drop-shadow-sm">{card.icon}</span>
                                                <span className="font-black text-gray-900 uppercase text-sm tracking-tighter">{card.type}</span>
                                                <span className="text-[10px] text-orange-500 font-black mt-1 bg-orange-50 px-3 py-0.5 rounded-full tracking-tighter">{card.points} PTS</span>
                                                <div className="absolute top-0 right-0 w-8 h-8 bg-orange-100/50 rounded-bl-3xl border-l-2 border-b-2 border-orange-200/50 shadow-inner"></div>
                                            </div>
                                        ))}
                                    </div>
                                    {gameState.players[gameState.turnIndex]?.uid === user.uid && (
                                        <button onClick={passCard} disabled={selectedCardIndex === null} className={`px-24 py-6 rounded-[3.5rem] font-black text-2xl shadow-2xl transition-all active:scale-95 ${selectedCardIndex !== null ? 'bg-orange-600 text-white shadow-orange-100' : 'bg-gray-200 text-gray-400 cursor-not-allowed uppercase'}`}>
                                            Pass ➔
                                        </button>
                                    )}
                                </div>
                            )}

                            {gameState.status === 'finished' && gameState.winner && (
                                <div className="fixed inset-0 bg-orange-600/98 flex items-center justify-center p-6 z-[200] backdrop-blur-xl">
                                    <div className="bg-white p-12 rounded-[5rem] text-center max-w-sm w-full animate-bounce-subtle shadow-2xl border-b-[15px] border-orange-100">
                                        <div className="text-8xl mb-6 drop-shadow-xl">👑</div>
                                        <h2 className="text-4xl font-black mb-2 uppercase tracking-tighter">{gameState.winner.name} WINS!</h2>
                                        <div className="bg-orange-50 py-6 rounded-3xl mb-8 border-2 border-dashed border-orange-200">
                                            <p className="text-orange-600 font-black text-4xl">{gameState.winner.points} PTS</p>
                                        </div>
                                        <button onClick={resetGame} className="w-full bg-black text-white font-black py-6 rounded-[2.5rem] shadow-xl active:scale-95 transition-all text-lg uppercase tracking-widest">New Round</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                    <footer className="mt-auto py-12 flex flex-col gap-6 opacity-30 hover:opacity-100 transition-opacity">
                        <div className="flex gap-6">
                            <button onClick={() => { localStorage.removeItem('parchi_name'); window.location.reload(); }} className="text-[10px] underline font-black text-gray-400 uppercase tracking-widest">Switch User</button>
                            <button onClick={resetGame} className="text-[10px] text-red-500 underline font-black uppercase tracking-widest">Admin Reset</button>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
