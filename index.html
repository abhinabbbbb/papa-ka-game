<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parchi Trading - PAPA KA GAME</title>
    
    <!-- Tailwind CSS (Direct CDN for styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (Direct CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (To compile JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Custom Animations & Glassmorphism Styles -->
    <style>
        @keyframes gradient-xy {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animate-gradient-xy {
            background-size: 400% 400%;
            animation: gradient-xy 15s ease infinite;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .glass-panel-dark {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        .pop-in {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0.5) translateY(50px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .card-hover:hover {
            transform: translateY(-20px) scale(1.1) rotate(2deg);
            box-shadow: 0 20px 40px rgba(249, 115, 22, 0.4);
            border-color: #f97316;
            z-index: 50;
        }
        .pulse-glow {
            animation: pulseGlow 2s infinite;
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(249, 115, 22, 0); }
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }
        /* Timer Bar Animation */
        .timer-bar {
            transition: width 1s linear, background-color 0.3s ease;
        }
    </style>
</head>
<body class="m-0 p-0 overflow-x-hidden text-gray-800">
    <div id="root"></div>

    <!-- Main Game Logic -->
    <script type="text/babel" data-type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const { useState, useEffect } = React;

        // ==========================================
        // 🚀 FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDzr59rONvNPo9-VllDbdGz--MUPjAq6jo", 
            authDomain: "papa-ka-game.firebaseapp.com",
            projectId: "papa-ka-game",
            storageBucket: "papa-ka-game.appspot.com", 
            messagingSenderId: "972552037901",
            appId: "1:972552037901:web:0e8c86fe84f8efb1169744",
            measurementId: "G-Q44XZ9GSMN"
        };

        const appId = 'parchi-game-prod-v1'; 

        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 3 Fruits, but 4 copies each = 12 Cards. 
        // 3 Players will hold 4 cards each. You need 4 matching to win!
        const CARDS_DATA = [
            { type: 'Apple', points: 1000, icon: '🍎' },
            { type: 'Banana', points: 500, icon: '🍌' },
            { type: 'Grapes', points: 700, icon: '🍇' },
        ];

        const TURN_TIME_LIMIT_MS = 20000; // 20 Seconds Timer

        const App = () => {
            const [user, setUser] = useState(null);
            const [secretName, setSecretName] = useState(localStorage.getItem('parchi_secret') || '');
            const [displayName, setDisplayName] = useState(localStorage.getItem('parchi_display') || '');
            const [tempSecret, setTempSecret] = useState('');
            const [tempDisplay, setTempDisplay] = useState('');
            const [gameState, setGameState] = useState(null);
            const [selectedCardIndex, setSelectedCardIndex] = useState(null);
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState("");
            const [loginError, setLoginError] = useState("");
            const [isPassing, setIsPassing] = useState(false);
            const [timeLeft, setTimeLeft] = useState(20);

            // Sirf In-Game naam hi Database me jayega
            const getInGameName = (secret, display) => {
                const lowerSecret = secret?.toLowerCase();
                return (lowerSecret === "papa kali gand" || lowerSecret === "master abhinav") ? "PAPA" : display;
            };

            const isPapa = getInGameName(secretName, displayName) === "PAPA" || (gameState && gameState.players[0]?.uid === user?.uid);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (err) {
                        console.error("Auth failed:", err);
                        setErrorMsg("Login issue! Firebase console mein 'Anonymous Auth' chalu karo bhai.");
                    }
                };
                initAuth();
                
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return; 
                const gameDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', 'main');
                const unsubscribe = onSnapshot(gameDocRef, (snapshot) => {
                    if (snapshot.exists()) {
                        setGameState(snapshot.data());
                    } else {
                        setGameState(null);
                    }
                }, (error) => console.error("Firestore error:", error));
                return () => unsubscribe();
            }, [user]);

            // Timer Logic - Auto pass if 20 seconds are up!
            useEffect(() => {
                if (gameState?.status !== 'playing' || !gameState.turnDeadline) return;

                const updateTimer = () => {
                    const remaining = Math.max(0, Math.floor((gameState.turnDeadline - Date.now()) / 1000));
                    setTimeLeft(remaining);

                    // Agar timer khatam ho gaya aur meri chaal hai
                    if (remaining === 0 && gameState.players[gameState.turnIndex]?.uid === user?.uid && !isPassing) {
                        const myHand = gameState.hands[user.uid];
                        if (myHand && myHand.length > 0) {
                            // Agar koi parchi select nahi ki, toh random bhej do
                            const idxToPass = selectedCardIndex !== null ? selectedCardIndex : Math.floor(Math.random() * myHand.length);
                            passCard(idxToPass);
                        }
                    }
                };

                const interval = setInterval(updateTimer, 1000);
                updateTimer(); 

                return () => clearInterval(interval);
            }, [gameState?.status, gameState?.turnDeadline, gameState?.turnIndex, isPassing, selectedCardIndex, user?.uid]);

            const handleLogin = async () => {
                const sName = tempSecret.trim();
                const dName = tempDisplay.trim();
                if (sName.length > 0 && dName.length > 0) {
                    const finalName = getInGameName(sName, dName);
                    setSecretName(sName);
                    setDisplayName(dName);
                    localStorage.setItem('parchi_secret', sName);
                    localStorage.setItem('parchi_display', dName);
                    setLoginError("");

                    if (gameState && user) {
                        const myIdx = gameState.players.findIndex(p => p.uid === user.uid);
                        if (myIdx !== -1) {
                            const newPlayers = [...gameState.players];
                            newPlayers[myIdx].name = finalName;
                            try {
                                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', 'main'), {
                                    players: newPlayers
                                });
                            } catch (e) { console.error("Name update failed", e); }
                        }
                    }
                } else {
                    setLoginError("Bhai, dono fields bharna zaroori hai!");
                }
            };

            const handleChangeName = () => {
                setSecretName('');
                setDisplayName('');
                setTempSecret('');
                setTempDisplay('');
                localStorage.removeItem('parchi_secret');
                localStorage.removeItem('parchi_display');
            };

            const createGame = async () => {
                if (!user || !secretName || !displayName) return;
                const deck = [];
                CARDS_DATA.forEach(item => {
                    // Ab har player ke liye 4 cards (Total 12)
                    for (let i = 0; i < 4; i++) deck.push({ ...item, id: Math.random().toString(36).substr(2, 9) });
                });
                const shuffled = deck.sort(() => Math.random() - 0.5);

                const newState = {
                    players: [{ uid: user.uid, name: getInGameName(secretName, displayName) }],
                    hands: { [user.uid]: shuffled.slice(0, 4) },
                    deck: shuffled.slice(4),
                    turnIndex: 0,
                    status: 'waiting',
                    winner: null,
                    round: 1, 
                    scores: { [user.uid]: 0 }, 
                    direction: 1
                };
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', 'main'), newState);
            };

            const joinGame = async () => {
                if (!user || !gameState || !secretName || !displayName) return;
                if (gameState.players.some(p => p.uid === user.uid)) return;
                if (gameState.players.length >= 3) return;

                const updatedPlayers = [...gameState.players, { uid: user.uid, name: getInGameName(secretName, displayName) }];
                const myHand = gameState.deck.slice(0, 4);
                const restDeck = gameState.deck.slice(4);

                const updates = {
                    players: updatedPlayers,
                    [`hands.${user.uid}`]: myHand,
                    deck: restDeck,
                    [`scores.${user.uid}`]: 0, 
                    status: updatedPlayers.length === 3 ? 'setup' : 'waiting'
                };
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', 'main'), updates);
            };

            const startRound = async () => {
                const startIdx = (gameState.round - 1) % gameState.players.length;

                // FIX: Ab direction ka koi chakkar nahi, hamesha Fixed Cycle chalegi!
                const updates = { 
                    status: 'playing', 
                    direction: 1, 
                    turnIndex: startIdx,
                    turnDeadline: Date.now() + TURN_TIME_LIMIT_MS
                };

                let instantWinner = null;
                for (const p of gameState.players) {
                    const hand = gameState.hands[p.uid];
                    const tCounts = {};
                    hand.forEach(c => tCounts[c.type] = (tCounts[c.type] || 0) + 1);
                    // 4 matching check
                    const wType = Object.keys(tCounts).find(t => tCounts[t] === 4);
                    if (wType) {
                        instantWinner = { name: p.name, type: wType, uid: p.uid };
                        break;
                    }
                }

                if (instantWinner) {
                    const points = CARDS_DATA.find(c => c.type === instantWinner.type).points;
                    updates.status = gameState.round >= 5 ? 'game_over' : 'round_over';
                    updates.winner = { name: instantWinner.name, type: instantWinner.type, points, uid: instantWinner.uid };
                    updates[`scores.${instantWinner.uid}`] = (gameState.scores[instantWinner.uid] || 0) + points;
                }

                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', 'main'), updates);
            };

            const startNextRound = async () => {
                const deck = [];
                CARDS_DATA.forEach(item => {
                    for (let i = 0; i < 4; i++) deck.push({ ...item, id: Math.random().toString(36).substr(2, 9) });
                });
                const shuffled = deck.sort(() => Math.random() - 0.5);

                const updates = {
                    round: gameState.round + 1,
                    status: 'setup',
                    winner: null
                };
                gameState.players.forEach((p, i) => {
                    updates[`hands.${p.uid}`] = shuffled.slice(i * 4, i * 4 + 4);
                });
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', 'main'), updates);
            };

            const passCard = async (forcedIdx = null) => {
                const passedIdx = typeof forcedIdx === 'number' ? forcedIdx : selectedCardIndex;
                if (!user || passedIdx === null || !gameState || gameState.status !== 'playing' || isPassing) return;
                
                const myIdx = gameState.players.findIndex(p => p.uid === user.uid);
                if (gameState.turnIndex !== myIdx) return;

                setIsPassing(true);
                setSelectedCardIndex(null); 

                // FIX: Continuous fixed route logic! (A -> B -> C -> A)
                const nextIdx = (myIdx + 1) % gameState.players.length;
                const nextUid = gameState.players[nextIdx].uid;
                
                const myHand = [...gameState.hands[user.uid]];
                const nextHand = [...gameState.hands[nextUid]];

                const passed = myHand.splice(passedIdx, 1)[0];
                nextHand.push(passed);

                const updates = {
                    [`hands.${user.uid}`]: myHand,
                    [`hands.${nextUid}`]: nextHand,
                    turnIndex: nextIdx,
                    turnDeadline: Date.now() + TURN_TIME_LIMIT_MS // Reset timer for next player
                };

                // Win check (4 matching required)
                const typeCounts = {};
                nextHand.forEach(c => typeCounts[c.type] = (typeCounts[c.type] || 0) + 1);
                const winningType = Object.keys(typeCounts).find(t => typeCounts[t] >= 4);

                const myTypeCounts = {};
                myHand.forEach(c => myTypeCounts[c.type] = (myTypeCounts[c.type] || 0) + 1);
                const myWinningType = Object.keys(myTypeCounts).find(t => myTypeCounts[t] === 4);

                let finalWinner = null;
                let winUid = null;

                if (winningType) {
                    finalWinner = { name: gameState.players[nextIdx].name, type: winningType };
                    winUid = nextUid;
                } else if (myWinningType) {
                    finalWinner = { name: gameState.players[myIdx].name, type: myWinningType };
                    winUid = user.uid;
                }

                if (finalWinner) {
                    const points = CARDS_DATA.find(c => c.type === finalWinner.type).points;
                    updates.status = gameState.round >= 5 ? 'game_over' : 'round_over'; // 5 Rounds
                    updates.winner = { ...finalWinner, points, uid: winUid };
                    updates[`scores.${winUid}`] = (gameState.scores[winUid] || 0) + points;
                }

                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', 'main'), updates);
                } catch (e) {
                    console.error("Pass fail hua: ", e);
                } finally {
                    setIsPassing(false);
                }
            };

            const handlePassClick = () => passCard();

            const resetGame = async () => {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', 'main'));
            };

            if (loading) return (
                <div className="h-screen w-full flex items-center justify-center bg-gradient-to-br from-orange-400 via-pink-500 to-purple-600 animate-gradient-xy">
                    <div className="text-white font-black text-2xl tracking-widest uppercase animate-pulse flex flex-col items-center gap-4">
                        <span className="text-6xl animate-bounce">🎲</span>
                        GAME LOAD HO RAHA HAI...
                    </div>
                </div>
            );

            if (errorMsg) return (
                <div className="h-screen flex flex-col items-center justify-center bg-red-900 text-white p-10 text-center animate-gradient-xy">
                    <div className="glass-panel p-10 rounded-3xl">
                        <h2 className="text-3xl font-black mb-4 uppercase tracking-tighter text-red-500">Config Error!</h2>
                        <p className="font-bold text-gray-800">{errorMsg}</p>
                    </div>
                </div>
            );

            // LOGIN SCREEN 
            if (!secretName || !displayName) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 animate-gradient-xy flex items-center justify-center p-4 font-sans relative overflow-hidden">
                        <div className="absolute top-10 left-10 text-6xl opacity-30 animate-float" style={{ animationDelay: '0s' }}>🍎</div>
                        <div className="absolute bottom-20 right-20 text-7xl opacity-30 animate-float" style={{ animationDelay: '1s' }}>🍌</div>
                        <div className="absolute top-40 right-10 text-5xl opacity-30 animate-float" style={{ animationDelay: '2s' }}>🍇</div>

                        <div className="glass-panel p-10 rounded-[3rem] w-full max-w-sm text-center transform transition-all hover:scale-105 duration-500 pop-in border-t-[1px] border-l-[1px] border-white/50">
                            <div className="text-6xl mb-4 animate-bounce">👋</div>
                            <h2 className="text-4xl font-black text-gray-900 mb-1 uppercase tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-purple-600 to-orange-500">Player Login</h2>
                            <p className="text-xs text-gray-600 mb-6 font-bold uppercase tracking-widest italic">Secret Key Aur Display Name Daalo</p>
                            
                            <input 
                                type="password" 
                                placeholder="Secret Username..."
                                value={tempSecret}
                                onChange={(e) => setTempSecret(e.target.value)}
                                className="w-full px-6 py-4 rounded-2xl border-2 border-white/50 bg-white/50 backdrop-blur-sm outline-none mb-3 text-center font-bold text-lg focus:border-purple-500 focus:ring-4 focus:ring-purple-500/30 transition-all text-gray-900 shadow-inner"
                            />

                            <input 
                                type="text" 
                                placeholder="In-Game Display Name..."
                                value={tempDisplay}
                                onChange={(e) => setTempDisplay(e.target.value)}
                                className="w-full px-6 py-4 rounded-2xl border-2 border-white/50 bg-white/50 backdrop-blur-sm outline-none mb-4 text-center font-bold text-lg focus:border-purple-500 focus:ring-4 focus:ring-purple-500/30 transition-all text-gray-900 shadow-inner"
                            />

                            {loginError && <p className="text-red-600 text-[11px] font-black mb-4 uppercase bg-red-100/80 py-1 rounded-md">{loginError}</p>}
                            <button onClick={handleLogin} className="w-full bg-gradient-to-r from-orange-500 to-pink-500 hover:from-orange-600 hover:to-pink-600 transition-all text-white font-black py-4 rounded-2xl shadow-xl hover:shadow-2xl active:scale-95 text-sm uppercase tracking-[0.2em] relative overflow-hidden group">
                                <span className="relative z-10">Verify & Enter</span>
                                <div className="absolute inset-0 bg-white/20 transform -skew-x-12 -translate-x-full group-hover:animate-[slide_1s_ease-in-out]"></div>
                            </button>
                        </div>
                    </div>
                );
            }

            // MAIN GAME SCREEN
            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-900 via-indigo-900 to-purple-900 animate-gradient-xy p-4 font-sans flex flex-col items-center overflow-x-hidden text-white relative">
                    
                    <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-pink-600/20 rounded-full blur-[100px] pointer-events-none"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-orange-600/20 rounded-full blur-[100px] pointer-events-none"></div>

                    <header className="text-center mb-8 mt-4 z-10 pop-in">
                        <h1 className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-400 via-pink-400 to-yellow-400 tracking-tighter drop-shadow-lg uppercase mb-2">Parchi Trading</h1>
                        <div className={`mt-2 inline-flex items-center gap-3 px-6 py-2.5 rounded-full shadow-[0_0_15px_rgba(255,255,255,0.1)] border ${isPapa ? 'bg-gradient-to-r from-yellow-400 to-orange-500 border-yellow-300 text-white animate-pulse' : 'glass-panel-dark text-gray-200'}`}>
                                <span className="text-[10px] font-black uppercase tracking-widest opacity-80">
                                        {isPapa ? 'Master' : 'Player'}:
                                </span>
                                <span className="text-sm font-black uppercase flex items-center gap-1">
                                        {isPapa && '👑'} {getInGameName(secretName, displayName)}
                                </span>
                        </div>
                    </header>

                    {/* SCOREBOARD */}
                    {gameState && gameState.status !== 'waiting' && (
                            <div className="w-full max-w-2xl glass-panel p-5 rounded-[2.5rem] mb-8 flex justify-around items-center z-10 pop-in" style={{ animationDelay: '0.1s' }}>
                                    {gameState.players.map((p, i) => (
                                            <div key={p.uid} className="text-center px-4 relative group">
                                                    <p className="text-[10px] text-gray-600 uppercase font-black tracking-widest">{i === 0 ? `👑 ${p.name}` : p.name}</p>
                                                    <p className="text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-600 font-black text-3xl transition-transform group-hover:scale-125">{gameState.scores[p.uid] || 0}</p>
                                            </div>
                                    ))}
                                    <div className="text-center border-l-2 border-gray-300/50 pl-6 ml-2">
                                            <p className="text-[10px] text-gray-600 uppercase font-black tracking-widest">Round</p>
                                            <p className="text-gray-900 font-black text-3xl">{gameState.round} <span className="text-xl text-gray-500">/ 5</span></p>
                                    </div>
                            </div>
                    )}

                    {!gameState ? (
                        <div className="glass-panel p-12 rounded-[4rem] text-center max-w-md w-full z-10 pop-in mx-4 relative overflow-hidden">
                            <div className="absolute inset-0 bg-gradient-to-b from-white/40 to-transparent pointer-events-none"></div>
                            <div className="text-8xl mb-6 animate-float">🎲</div>
                            <p className="text-2xl mb-10 text-gray-800 font-black italic uppercase tracking-tighter">
                                {isPapa ? "Round ke liye taiyaar ho, PAPA?" : "Master ke start karne ka wait kar rahe hain..."}
                            </p>
                            {isPapa ? (
                                 <button onClick={createGame} className="w-full bg-gradient-to-r from-orange-500 via-red-500 to-pink-500 text-white font-black py-6 rounded-[2.5rem] shadow-[0_10px_30px_rgba(249,115,22,0.5)] active:scale-95 text-xl uppercase tracking-widest hover:shadow-[0_15px_40px_rgba(249,115,22,0.7)] transition-all pulse-glow">GAME START KARO</button>
                            ) : (
                                 <div className="px-6 py-4 rounded-2xl glass-panel-dark inline-block border border-white/20 shadow-lg">
                                    <span className="text-sm text-yellow-300 font-bold uppercase tracking-widest animate-pulse">Wait kar rahe hain...</span>
                                 </div>
                            )}
                        </div>
                    ) : (
                        <div className="w-full max-w-3xl px-2 z-10">
                            
                            {/* Status Bar */}
                            <div className="glass-panel rounded-3xl p-6 mb-8 flex justify-between items-center pop-in" style={{ animationDelay: '0.2s' }}>
                                <div>
                                    <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest">Status</p>
                                    <p className="font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-red-600 text-2xl italic uppercase drop-shadow-sm">
                                        {gameState.status === 'waiting' ? `Waiting Lobby (${gameState.players.length}/3)` : '🔥 LIVE'}
                                    </p>
                                </div>
                                <div className="text-right">
                                    <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest">Turn (Chaal)</p>
                                    <p className={`font-black text-2xl italic uppercase ${gameState.turnIndex === 0 ? 'text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500 drop-shadow-md animate-pulse' : 'text-gray-800'}`}>
                                        {gameState.status === 'playing' ? (
                                             gameState.turnIndex === 0 ? `👑 ${gameState.players[gameState.turnIndex]?.name} SOCH RAHA HAI...` : gameState.players[gameState.turnIndex]?.name
                                        ) : '---'}
                                    </p>
                                </div>
                            </div>

                            {gameState.status === 'playing' && (
                                    <div className="text-center mb-8 pop-in" style={{ animationDelay: '0.3s' }}>
                                            <span className="glass-panel px-6 py-2.5 rounded-full text-[11px] font-black uppercase tracking-widest shadow-lg border border-white/40 text-gray-800">
                                                    Cycle: Player 1 ➔ Player 2 ➔ Player 3
                                            </span>
                                    </div>
                            )}

                            {/* WAITING LOBBY */}
                            {gameState.status === 'waiting' ? (
                                <div className="glass-panel-dark border-2 border-white/20 p-12 rounded-[3rem] text-center mb-10 pop-in relative overflow-hidden" style={{ animationDelay: '0.3s' }}>
                                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-white to-transparent animate-[slide_2s_infinite]"></div>
                                        <div className="animate-spin text-6xl mb-6 inline-block opacity-80">⌛</div>
                                        <h3 className="text-2xl font-black text-white/90 uppercase tracking-tighter mb-8 text-shadow">Players Connected:</h3>
                                        
                                        <div className="flex flex-col gap-4 max-w-sm mx-auto mb-10">
                                                {gameState.players.map((p, idx) => (
                                                        <div key={idx} className={`py-4 px-6 rounded-2xl font-black uppercase tracking-widest text-sm flex items-center justify-center gap-3 transition-all transform hover:scale-105 duration-300 ${idx === 0 ? 'bg-gradient-to-r from-yellow-400 to-orange-500 text-white shadow-[0_0_30px_rgba(255,215,0,0.6)] border-2 border-yellow-200 animate-pulse' : 'glass-panel text-gray-800'}`}>
                                                                {idx === 0 ? `👑 ${p.name} (MASTER) AA GAYA HAI 👑` : `👤 ${p.name}`}
                                                        </div>
                                                ))}
                                        </div>

                                        {!gameState.players.some(p => p.uid === user.uid) && (
                                            <button onClick={joinGame} className="mt-2 w-full max-w-[250px] py-5 bg-gradient-to-r from-emerald-400 to-teal-500 hover:from-emerald-500 hover:to-teal-600 transition-all text-white font-black rounded-2xl shadow-[0_0_20px_rgba(16,185,129,0.5)] uppercase tracking-widest active:scale-95 text-lg hover:shadow-[0_0_30px_rgba(16,185,129,0.8)]">JOIN LOBBY</button>
                                        )}
                                </div>
                            ) : gameState.status === 'setup' ? (
                                <div className="glass-panel p-14 rounded-[4rem] text-center pop-in relative overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.3)]">
                                        <div className="absolute inset-0 bg-gradient-to-b from-white/50 to-transparent pointer-events-none"></div>
                                        <h3 className="text-5xl font-black text-gray-900 uppercase tracking-tighter mb-6">Round {gameState.round} Tayar!</h3>
                                        {isPapa ? (
                                                <div className="relative z-10">
                                                        <p className="text-lg text-gray-600 font-bold mb-10 uppercase tracking-widest">Master, Game Start Karein?</p>
                                                        <div className="flex justify-center flex-wrap">
                                                                <button onClick={() => startRound()} className="px-10 py-6 bg-gradient-to-br from-orange-400 to-red-500 text-white rounded-[2rem] font-black active:scale-95 shadow-xl uppercase tracking-wider text-lg hover:shadow-2xl transition-all hover:-translate-y-1">🚀 Round Start Karo<br/><span className="text-xs opacity-80">(Fixed Cycle)</span></button>
                                                        </div>
                                                </div>
                                        ) : (
                                                <div className="bg-gray-900/10 p-6 rounded-3xl mt-8">
                                                    <p className="text-xl text-purple-700 font-black animate-pulse uppercase tracking-widest">Master start kar rahe hain...</p>
                                                </div>
                                        )}
                                </div>
                            ) : gameState.status === 'playing' ? (
                                <div className="mb-14 pop-in" style={{ animationDelay: '0.4s' }}>
                                    
                                    {/* Timer Display if active */}
                                    <div className="flex justify-center mb-8">
                                        <div className="w-full max-w-sm glass-panel-dark p-3 rounded-full border border-white/20 relative overflow-hidden">
                                            <div 
                                                className={`h-2 rounded-full timer-bar ${timeLeft <= 5 ? 'bg-red-500 shadow-[0_0_15px_red]' : 'bg-gradient-to-r from-green-400 to-emerald-500'}`}
                                                style={{ width: `${(timeLeft / 20) * 100}%` }}
                                            ></div>
                                            <p className={`text-center text-[10px] font-black tracking-[0.2em] mt-2 uppercase ${timeLeft <= 5 ? 'text-red-400 animate-pulse' : 'text-gray-300'}`}>
                                                ⏱️ TIME LEFT: {timeLeft}s
                                            </p>
                                        </div>
                                    </div>

                                    <h3 className="text-center mb-10 text-white/70 font-black text-[12px] tracking-[0.5em] uppercase text-shadow">Tumhare Cards</h3>
                                    
                                    {/* CARDS DISPLAY */}
                                    <div className="flex justify-center gap-4 sm:gap-6 flex-wrap perspective-1000">
                                        {gameState.hands[user.uid]?.map((card, idx) => (
                                            <div 
                                                key={card.id || idx}
                                                onClick={() => gameState.status === 'playing' && setSelectedCardIndex(idx)}
                                                className={`
                                                    relative w-24 sm:w-32 h-36 sm:h-48 rounded-[1.5rem] sm:rounded-[2rem] cursor-pointer flex flex-col items-center justify-center transition-all duration-300 card-hover
                                                    ${selectedCardIndex === idx 
                                                        ? 'bg-gradient-to-br from-white to-orange-50 border-[4px] border-orange-500 -translate-y-8 shadow-[0_20px_50px_rgba(249,115,22,0.6)] scale-110 z-50' 
                                                        : 'glass-panel border border-white/60 shadow-lg'
                                                    }
                                                `}
                                                style={{ animation: `popIn 0.5s ease-out ${idx * 0.1 + 0.5}s both` }}
                                            >
                                                <span className="text-5xl sm:text-6xl mb-4 drop-shadow-md transform transition-transform group-hover:scale-110">{card.icon}</span>
                                                <span className="font-black text-gray-800 text-sm sm:text-lg uppercase tracking-tighter">{card.type}</span>
                                                <div className="absolute top-0 right-0 w-8 h-8 bg-gradient-to-bl from-white/50 to-transparent rounded-bl-[1.5rem] rounded-tr-[1.2rem]"></div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* ACTION BUTTON AREA */}
                                    <div className="mt-16 text-center">
                                        {gameState.players[gameState.turnIndex]?.uid === user.uid ? (
                                            <div className="flex flex-col items-center gap-6 pop-in">
                                                    <div className="bg-gradient-to-r from-orange-500 to-red-500 text-white text-[12px] px-8 py-3 rounded-full font-black animate-bounce uppercase tracking-widest shadow-[0_0_20px_rgba(249,115,22,0.6)] border border-white/30">TUMHARI CHAAL HAI!</div>
                                                    <button 
                                                        disabled={selectedCardIndex === null || isPassing}
                                                        onClick={handlePassClick}
                                                        className={`px-16 sm:px-20 py-5 sm:py-6 rounded-[3rem] font-black text-xl sm:text-2xl transition-all duration-300 active:scale-95 ${
                                                            (selectedCardIndex !== null && !isPassing) 
                                                            ? 'bg-gradient-to-r from-green-400 to-emerald-600 text-white shadow-[0_15px_40px_rgba(16,185,129,0.5)] hover:shadow-[0_20px_50px_rgba(16,185,129,0.7)] hover:-translate-y-2 pulse-glow border border-white/40' 
                                                            : 'bg-white/20 text-white/50 cursor-not-allowed border border-white/10 backdrop-blur-md'
                                                        }`}
                                                    >
                                                        {isPassing ? 'WAIT...' : 'PARCHI PASS KARO ➔'}
                                                    </button>
                                            </div>
                                        ) : (
                                            <div className={`py-6 px-12 border border-white/20 rounded-[3rem] inline-block shadow-2xl backdrop-blur-md ${gameState.turnIndex === 0 ? 'bg-yellow-500/20' : 'glass-panel-dark'}`}>
                                                    <p className={`font-black italic text-md uppercase tracking-widest ${gameState.turnIndex === 0 ? 'text-yellow-300' : 'text-gray-300'}`}>
                                                         Wait kar rahe hain <span className={gameState.turnIndex === 0 ? 'text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]' : 'text-orange-400'}>
                                                                 {gameState.turnIndex === 0 ? `👑 ${gameState.players[gameState.turnIndex]?.name}` : gameState.players[gameState.turnIndex]?.name}
                                                         </span> ka...
                                                    </p>
                                            </div>
                                        )}
                                    </div>

                                    {/* 👁️ MASTER'S EYE VIEW 👁️ */}
                                    {isPapa && (
                                            <div className="mt-28 border-t-[1px] border-white/20 pt-16 relative">
                                                    <div className="absolute top-[-15px] left-1/2 transform -translate-x-1/2 bg-indigo-900 px-6 py-2 rounded-full border border-white/20">
                                                        <h3 className="text-center text-pink-400 font-black text-xs tracking-[0.5em] uppercase animate-pulse">👁️ Master Ki Nazar (Sab Dikhta Hai) 👁️</h3>
                                                    </div>
                                                    
                                                    <div className="flex flex-col gap-8">
                                                            {gameState.players.map(p => {
                                                                    if (p.uid === user.uid) return null;
                                                                    return (
                                                                            <div key={p.uid} className="glass-panel-dark p-8 rounded-[3rem] border border-white/10 shadow-[inset_0_0_30px_rgba(0,0,0,0.5)] hover:bg-white/5 transition-colors">
                                                                                    <p className="text-center text-sm font-black text-pink-300 uppercase tracking-widest mb-6 drop-shadow-md">{p.name} Ke Cards</p>
                                                                                    <div className="flex justify-center gap-5 flex-wrap">
                                                                                            {gameState.hands[p.uid]?.map((card, cIdx) => (
                                                                                                    <div key={cIdx} className="w-16 h-24 sm:w-20 sm:h-28 glass-panel rounded-2xl shadow-xl border border-white/30 flex flex-col items-center justify-center transform hover:scale-110 transition-transform bg-white/10">
                                                                                                            <span className="text-3xl sm:text-4xl mb-2 drop-shadow-lg">{card.icon}</span>
                                                                                                            <span className="text-[8px] sm:text-[9px] font-black text-white uppercase leading-none drop-shadow-md">{card.type}</span>
                                                                                                    </div>
                                                                                            ))}
                                                                                    </div>
                                                                            </div>
                                                                    )
                                                            })}
                                                    </div>
                                            </div>
                                    )}
                                </div>
                            ) : null}

                            {/* ROUND OVER / GAME OVER MODAL */}
                            {(gameState.status === 'round_over' || gameState.status === 'game_over') && gameState.winner && (
                                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-6 z-[200] backdrop-blur-2xl">
                                    <div className="glass-panel p-12 rounded-[4rem] shadow-[0_0_100px_rgba(249,115,22,0.4)] text-center max-w-md w-full border border-white/60 transform scale-0 animate-[popIn_0.6s_spring_forwards] relative overflow-hidden">
                                        
                                        <div className="absolute top-0 left-1/2 transform -translate-x-1/2 w-full h-full bg-[radial-gradient(circle,rgba(249,115,22,0.2)_0%,transparent_70%)] pointer-events-none"></div>

                                        <div className="text-9xl mb-6 animate-bounce drop-shadow-[0_20px_20px_rgba(0,0,0,0.3)]">🎆</div>
                                        <p className="text-[12px] text-gray-600 font-black uppercase tracking-[0.3em] mb-2 drop-shadow-sm">
                                                {gameState.status === 'game_over' ? 'FINAL CHAMPION' : `ROUND ${gameState.round} WINNER!`}
                                        </p>
                                        <h2 className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-600 mb-4 uppercase tracking-tighter drop-shadow-lg">
                                            {gameState.players.findIndex(p => p.uid === gameState.winner.uid) === 0 ? `👑 ${gameState.winner.name}` : gameState.winner.name} JEET GAYA!
                                        </h2>
                                        
                                        <div className="bg-gradient-to-br from-orange-100 to-orange-200 py-10 px-6 rounded-[3rem] mb-10 border-2 border-orange-300 shadow-inner relative overflow-hidden">
                                                <div className="absolute inset-0 opacity-20 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPjxyZWN0IHdpZHRoPSI4IiBoZWlnaHQ9IjgiIGZpbGw9IiNmZmYiPjwvbV>')]"></div>
                                                <p className="text-orange-600 font-black text-5xl uppercase drop-shadow-md relative z-10">+{gameState.winner.points} PTS</p>
                                                <p className="text-orange-800/60 font-black text-[11px] uppercase tracking-[0.3em] mt-4 relative z-10">{gameState.winner.type} x4 Ek Sath!</p>
                                        </div>

                                        {gameState.status === 'round_over' ? (
                                                isPapa ? (
                                                        <button onClick={startNextRound} className="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-black py-6 rounded-[3rem] shadow-[0_10px_30px_rgba(79,70,229,0.5)] hover:shadow-[0_15px_40px_rgba(79,70,229,0.7)] active:scale-95 transition-all text-xl uppercase tracking-widest hover:-translate-y-1">Next Round</button>
                                                ) : (
                                                        <p className="text-sm text-gray-500 font-bold uppercase tracking-widest bg-white/50 py-3 rounded-full">Master next round start karenge...</p>
                                                )
                                        ) : (
                                                <div className="relative z-10">
                                                        <p className="mb-6 text-sm font-black text-gray-800 uppercase tracking-[0.2em] border-b-2 border-gray-300/50 pb-3">Final Leaderboard</p>
                                                        <div className="flex flex-col gap-3 mb-8">
                                                            {[...gameState.players].sort((a,b) => gameState.scores[b.uid] - gameState.scores[a.uid]).map((p, i) => (
                                                                    <div key={p.uid} className={`flex justify-between items-center font-black text-lg p-4 rounded-2xl ${i===0 ? 'bg-gradient-to-r from-yellow-100 to-yellow-200 border border-yellow-400 shadow-md transform scale-105' : 'bg-white/50 border border-white/50'}`}>
                                                                            <span className="text-gray-800">{i+1}. {p.uid === gameState.players[0]?.uid ? `👑 ${p.name}` : p.name}</span>
                                                                            <span className={i===0 ? 'text-yellow-600 text-2xl' : 'text-gray-600'}>{gameState.scores[p.uid]} PTS</span>
                                                                    </div>
                                                            ))}
                                                        </div>
                                                        {isPapa ? (
                                                                <button onClick={resetGame} className="w-full bg-gradient-to-r from-gray-800 to-black text-white font-black py-6 rounded-[3rem] shadow-2xl active:scale-95 transition-all text-xl uppercase tracking-widest hover:-translate-y-1">Naya Game</button>
                                                        ) : (
                                                                <p className="text-sm text-gray-500 font-bold uppercase tracking-widest bg-white/50 py-3 rounded-full">Master naya game banayenge...</p>
                                                        )}
                                                </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    <footer className="mt-auto py-12 text-center opacity-50 hover:opacity-100 transition-opacity duration-300 flex flex-col items-center gap-6 z-10">
                        <div className="flex gap-8 bg-black/20 px-8 py-3 rounded-full backdrop-blur-md border border-white/10">
                                <button onClick={handleChangeName} className="text-[10px] font-black text-white/70 uppercase tracking-widest hover:text-white transition-colors">Naam Badlo</button>
                                {isPapa && (
                                        <button onClick={resetGame} className="text-[10px] text-red-400 font-black uppercase tracking-widest hover:text-red-300 transition-colors">Game Reset Karo</button>
                                )}
                        </div>
                        <p className="text-[9px] text-white/40 font-black tracking-[0.8em] uppercase">SYSTEM VIP EDITION</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
