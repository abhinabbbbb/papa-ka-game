<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parchi Trading Game - PAPA Edition</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for No-Node Setup -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase Scripts (Compat Versions) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .animate-bounce-subtle { animation: bounce-subtle 2.5s infinite ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body class="bg-orange-50 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        // Purane test errors clear kar rahe hain
        localStorage.removeItem('fixed_api_key');

        const { useState, useEffect } = React;

        // =========================================================================
        // 💯 ORIGINAL EXACT CONFIG (Reverted back to your first screenshot)
        // =========================================================================
        const myHardcodedConfig = {
            apiKey: "AIzaSyDzr59rONvNpo9-VllDbdGz--MUPjAq6jo", // 'O' is correct!
            authDomain: "papa-ka-game.firebaseapp.com",
            projectId: "papa-ka-game",
            storageBucket: "papa-ka-game.firebasestorage.app", // firebasestorage is correct!
            messagingSenderId: "972552037901",
            appId: "1:972552037901:web:0e8c86fe84f8efb1169744",
            measurementId: "G-Q44XZ9GSMN"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : myHardcodedConfig;

        // Initialize Firebase safely
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        const currentAppId = typeof __app_id !== 'undefined' ? __app_id : "parchi-final-v1";

        const CARDS_DATA = [
            { type: 'Apple', points: 1000, icon: '🍎' },
            { type: 'Banana', points: 500, icon: '🍌' },
            { type: 'Grapes', points: 700, icon: '🍇' },
        ];

        const ALLOWED_NAMES = ["Truffle chocolate cake", "kaka", "master abhinav"];

        function App() {
            const [user, setUser] = useState(null);
            const [userName, setUserName] = useState(localStorage.getItem('parchi_name') || '');
            const [tempName, setTempName] = useState('');
            const [gameState, setGameState] = useState(null);
            const [selectedCardIndex, setSelectedCardIndex] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState("");
            const [detailedError, setDetailedError] = useState("");
            const [loginError, setLoginError] = useState("");
            const [currentDomain, setCurrentDomain] = useState(window.location.hostname);

            const getInGameName = (name) => (name === "master abhinav" ? "PAPA" : name);
            const getRoleTitle = (name) => (name === "master abhinav" ? "Master" : "Player");

            // 1. Auth Logic 
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Auth Fail:", err);
                        setError("Firebase Auth Setup Blocked!");
                        setDetailedError(err.message);
                        setLoading(false);
                    }
                };
                
                initAuth();

                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (u) {
                        setUser(u);
                        setLoading(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            // 2. Database Sync
            useEffect(() => {
                if (!user || !userName) return;
                
                const docPath = `artifacts/${currentAppId}/public/data/games/main`;
                
                const unsubscribe = db.doc(docPath).onSnapshot((snapshot) => {
                    if (snapshot.exists) setGameState(snapshot.data());
                    else setGameState(null);
                }, (err) => {
                    console.error("Firestore Error:", err);
                    setError("Database Permission Blocked!");
                    setDetailedError(err.message);
                });
                return () => unsubscribe();
            }, [user, userName]);

            const handleLogin = () => {
                const trimmed = tempName.trim();
                if (ALLOWED_NAMES.includes(trimmed)) {
                    setUserName(trimmed);
                    localStorage.setItem('parchi_name', trimmed);
                    setLoginError("");
                } else {
                    setLoginError("Restricted: Aapka naam allowed list mein nahi hai!");
                }
            };

            const createGame = async () => {
                if (!user) return;
                const deck = [];
                CARDS_DATA.forEach(item => {
                    for (let i = 0; i < 3; i++) deck.push({ ...item, id: Math.random().toString(36).substr(2, 9) });
                });
                const shuffled = deck.sort(() => Math.random() - 0.5);

                const newState = {
                    players: [{ uid: user.uid, name: getInGameName(userName) }],
                    hands: { [user.uid]: shuffled.slice(0, 3) },
                    deck: shuffled.slice(3),
                    turnIndex: 0,
                    status: 'waiting',
                    winner: null
                };
                try {
                    await db.doc(`artifacts/${currentAppId}/public/data/games/main`).set(newState);
                } catch (e) {
                    setError("Game Create Nahi Ho Pa Raha!");
                    setDetailedError(e.message);
                }
            };

            const joinGame = async () => {
                if (!user || !gameState) return;
                if (gameState.players.some(p => p.uid === user.uid)) return;
                
                const updatedPlayers = [...gameState.players, { uid: user.uid, name: getInGameName(userName) }];
                const myHand = gameState.deck.slice(0, 3);
                const restDeck = gameState.deck.slice(3);

                const updates = {
                    players: updatedPlayers,
                    [`hands.${user.uid}`]: myHand,
                    deck: restDeck,
                    status: updatedPlayers.length === 3 ? 'playing' : 'waiting'
                };
                await db.doc(`artifacts/${currentAppId}/public/data/games/main`).update(updates);
            };

            const passCard = async () => {
                if (!user || !gameState) return;
                const myIdx = gameState.players.findIndex(p => p.uid === user.uid);
                if (gameState.turnIndex !== myIdx) return;

                const nextIdx = (myIdx + 1) % 3;
                const nextUid = gameState.players[nextIdx].uid;
                const myHand = [...(gameState.hands[user.uid] || [])];
                const nextHand = [...(gameState.hands[nextUid] || [])];

                const passed = myHand.splice(selectedCardIndex, 1)[0];
                nextHand.push(passed);

                const updates = {
                    [`hands.${user.uid}`]: myHand,
                    [`hands.${nextUid}`]: nextHand,
                    turnIndex: nextIdx
                };

                const types = nextHand.map(c => c.type);
                if (new Set(types).size === 1 && nextHand.length === 3) {
                    updates.status = 'finished';
                    updates.winner = { name: gameState.players[nextIdx].name, type: types[0], points: nextHand[0].points };
                }
                await db.doc(`artifacts/${currentAppId}/public/data/games/main`).update(updates);
                setSelectedCardIndex(null);
            };

            const resetGame = async () => {
                await db.doc(`artifacts/${currentAppId}/public/data/games/main`).delete();
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-orange-50 p-6">
                    <div className="animate-spin rounded-full h-12 w-12 border-t-4 border-orange-500 mb-4"></div>
                    <p className="font-black text-orange-600 uppercase tracking-widest text-xs tracking-tighter">PAPA Ka Server Connect Ho Raha Hai...</p>
                </div>
            );

            if (error) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-red-50 p-8 text-center">
                        <h2 className="text-4xl font-black text-red-600 mb-6 uppercase tracking-tighter">ERROR AAYA HAI!</h2>
                        
                        <div className="bg-white p-10 rounded-[4rem] shadow-2xl border-b-[15px] border-red-100 max-w-sm w-full">
                            <p className="text-gray-900 font-black mb-4 leading-tight uppercase text-sm tracking-widest">{error}</p>
                            
                            <div className="bg-red-50 p-5 rounded-3xl text-[11px] text-red-700 font-mono break-words text-left border border-red-100 mb-4">
                                <strong>Firebase Says:</strong><br/>
                                {detailedError}
                            </div>
                            
                            {/* DOMAIN CHECKER */}
                            <div className="bg-orange-50 p-4 rounded-3xl text-[10px] text-orange-800 text-left border border-orange-200">
                                <b>Your Current URL:</b><br/> 
                                <span className="font-mono bg-white px-2 py-1 rounded shadow-sm inline-block mt-1">{currentDomain}</span><br/>
                                <span className="mt-2 inline-block">Kya ye URL exactly <b>papa-ka-game.vercel.app</b> hai? Agar nahi, toh is naye URL ko bhi Firebase me Add Domain karo.</span>
                            </div>
                        </div>
                        
                        <button onClick={() => window.location.reload()} className="mt-12 bg-red-600 text-white px-16 py-5 rounded-[2.5rem] font-black shadow-2xl uppercase active:scale-95 transition-all text-sm tracking-widest">Force Reload</button>
                    </div>
                );
            }

            if (!userName) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white p-12 rounded-[5rem] shadow-2xl w-full max-w-sm text-center border-b-[15px] border-orange-200">
                            <div className="text-6xl mb-6">🔒</div>
                            <h2 className="text-3xl font-black text-gray-800 mb-2 uppercase tracking-tighter">VIP ACCESS</h2>
                            <p className="text-[10px] text-gray-400 mb-10 uppercase tracking-[0.4em] font-black italic">Identity Verification Required</p>
                            <input 
                                type="text" 
                                placeholder="Secret Name..."
                                value={tempName}
                                onChange={(e) => setTempName(e.target.value)}
                                className="w-full px-8 py-5 rounded-3xl border-2 border-orange-100 outline-none mb-6 text-center font-bold text-lg focus:border-orange-500 bg-gray-50"
                            />
                            {loginError && <p className="text-red-500 text-[10px] font-black mb-6 uppercase animate-shake">{loginError}</p>}
                            <button onClick={handleLogin} className="w-full bg-orange-500 text-white font-black py-5 rounded-3xl shadow-xl active:scale-95 transition-all text-sm tracking-widest uppercase">Verify Me</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 flex flex-col items-center">
                    <header className="text-center mb-8 mt-4">
                        <h1 className="text-5xl font-black text-orange-600 uppercase tracking-tighter drop-shadow-sm italic">Parchi Trading</h1>
                        <div className="mt-4 inline-flex items-center gap-2 bg-white px-6 py-2.5 rounded-full shadow-md border border-orange-100">
                            <span className="text-[10px] font-black uppercase text-gray-400 tracking-[0.2em]">{getRoleTitle(userName)}:</span>
                            <span className="text-md font-black text-gray-800 uppercase tracking-tighter">{getInGameName(userName)}</span>
                        </div>
                    </header>

                    {!gameState ? (
                        <div className="bg-white p-16 rounded-[6rem] shadow-2xl text-center max-w-md w-full border-b-[15px] border-orange-200">
                            <div className="text-8xl mb-8 drop-shadow-lg animate-bounce-subtle">🃏</div>
                            <p className="text-2xl mb-12 text-gray-700 font-black italic uppercase tracking-tighter leading-tight">
                                {userName === 'master abhinav' ? "Papa, khel shuru karein?" : "Waiting for PAPA to start..."}
                            </p>
                            <button onClick={createGame} className="w-full bg-orange-600 text-white font-black py-6 rounded-[3.5rem] shadow-2xl active:scale-95 text-xl uppercase tracking-widest">Create Room</button>
                        </div>
                    ) : (
                        <div className="w-full max-w-2xl">
                            <div className="bg-white rounded-[2.5rem] p-8 mb-12 flex justify-between border-2 border-orange-50 shadow-2xl">
                                <div className="flex flex-col">
                                    <span className="text-[10px] font-black text-gray-300 uppercase tracking-[0.2em]">Game Status</span>
                                    <span className="font-black text-orange-600 italic uppercase text-2xl">{gameState.status}</span>
                                </div>
                                <div className="flex flex-col text-right">
                                    <span className="text-[10px] font-black text-gray-300 uppercase tracking-[0.2em]">PAPA Board</span>
                                    <span className="font-black text-gray-800 italic uppercase text-2xl">{gameState.players[gameState.turnIndex]?.name || "---"}</span>
                                </div>
                            </div>

                            {gameState.status === 'waiting' ? (
                                <div className="bg-white/70 backdrop-blur-md border-4 border-dashed border-orange-200 p-14 rounded-[5rem] text-center mb-10 shadow-inner">
                                    <div className="text-7xl mb-8 animate-pulse">👥</div>
                                    <h3 className="text-3xl font-black text-orange-900/40 uppercase tracking-tighter">Assembling Crew... ({gameState.players.length}/3)</h3>
                                    {!gameState.players.some(p => p.uid === user.uid) && (
                                        <button onClick={joinGame} className="mt-12 px-20 py-6 bg-green-500 text-white font-black rounded-[3rem] shadow-2xl uppercase active:scale-95 transition-all tracking-widest text-xl">Join Game</button>
                                    )}
                                </div>
                            ) : (
                                <div className="text-center">
                                    <div className="flex justify-center gap-6 flex-wrap mb-16">
                                        {(gameState.hands[user.uid] || []).map((card, idx) => (
                                            <div 
                                                key={card.id || idx}
                                                onClick={() => setSelectedCardIndex(idx)}
                                                className={`relative w-36 h-52 bg-white rounded-[2.5rem] shadow-2xl border-[6px] flex flex-col items-center justify-center transition-all duration-500 cursor-pointer ${selectedCardIndex === idx ? 'border-orange-500 -translate-y-12 scale-115 ring-[18px] ring-orange-100' : 'border-white hover:border-orange-50'}`}
                                            >
                                                <span className="text-7xl mb-6 drop-shadow-xl">{card.icon}</span>
                                                <span className="font-black text-gray-900 uppercase text-lg tracking-tighter leading-none">{card.type}</span>
                                                <span className="text-xs text-orange-500 font-black mt-4 bg-orange-50 px-5 py-1.5 rounded-full shadow-inner">{card.points} PTS</span>
                                                <div className="absolute top-0 right-0 w-12 h-12 bg-orange-100/40 rounded-bl-[3.5rem] border-l-2 border-b-2 border-orange-200/50 shadow-inner"></div>
                                            </div>
                                        ))}
                                    </div>
                                    {gameState.players[gameState.turnIndex]?.uid === user.uid && (
                                        <div className="flex flex-col items-center gap-8">
                                            <div className="bg-orange-500 text-white text-[12px] px-8 py-2.5 rounded-full font-black animate-bounce uppercase tracking-[0.3em] shadow-xl">PAPA, Chaal Chalo!</div>
                                            <button onClick={passCard} disabled={selectedCardIndex === null} className={`px-32 py-8 rounded-[5rem] font-black text-4xl shadow-[0_30px_60px_-15px_rgba(0,0,0,0.3)] transition-all active:scale-95 ${selectedCardIndex !== null ? 'bg-orange-600 text-white shadow-orange-100' : 'bg-gray-200 text-gray-400 cursor-not-allowed uppercase'}`}>
                                                Pass ➔
                                            </button>
                                        </div>
                                    )}
                                </div>
                            )}

                            {gameState.status === 'finished' && gameState.winner && (
                                <div className="fixed inset-0 bg-orange-600/98 flex items-center justify-center p-6 z-[500] backdrop-blur-3xl">
                                    <div className="bg-white p-16 rounded-[7rem] text-center max-w-sm w-full animate-bounce-subtle shadow-[0_45px_100px_-20px_rgba(0,0,0,0.6)] border-b-[25px] border-orange-100">
                                        <div className="text-9xl mb-10 drop-shadow-2xl animate-pulse">🏆</div>
                                        <h2 className="text-5xl font-black mb-4 uppercase tracking-tighter leading-none">{gameState.winner.name}<br/>JEETA!</h2>
                                        <div className="bg-orange-50 py-10 rounded-[4rem] mb-12 border-6 border-dashed border-orange-200">
                                            <p className="text-orange-600 font-black text-6xl tracking-tighter">{gameState.winner.points}</p>
                                            <p className="text-gray-400 font-black text-[12px] uppercase tracking-[0.3em] mt-4">PAPA Power Confirmed!</p>
                                        </div>
                                        <button onClick={resetGame} className="w-full bg-black text-white font-black py-8 rounded-[4rem] shadow-2xl active:scale-95 transition-all text-2xl uppercase tracking-widest">New Round</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                    <footer className="mt-auto py-20 flex flex-col gap-10 opacity-30 hover:opacity-100 transition-all duration-700 flex flex-col items-center">
                        <div className="flex gap-12">
                            <button onClick={() => { localStorage.removeItem('parchi_name'); window.location.reload(); }} className="text-[11px] underline font-black text-gray-400 uppercase tracking-[0.4em] hover:text-orange-600 transition-colors">Switch User</button>
                            <button onClick={resetGame} className="text-[11px] text-red-500 underline font-black uppercase tracking-[0.4em] hover:text-red-700 transition-colors">Full Reset</button>
                        </div>
                        <p className="text-[9px] text-gray-300 font-black tracking-[1em] uppercase">PAPA EDITION V1</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
